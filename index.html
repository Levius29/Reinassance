<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Protocollo">
    <meta name="theme-color" content="#0c0e12">
    <title>Protocollo 12 Settimane</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js" defer></script>
    <script type="module" src="./js/app.js"></script>
  </head>
  <body>
    <div id="app" class="app-shell">
      <main>
        <section id="view-oggi" class="view"></section>
        <section id="view-settimana" class="view" hidden></section>
        <section id="view-valori" class="view" hidden></section>
        <section id="view-grafici" class="view" hidden></section>
        <section id="view-report" class="view" hidden></section>
      </main>
    </div>

    <dialog id="modal" class="modal">
      <div class="modal-panel">
        <button class="icon-button modal-close" type="button" data-close-modal aria-label="Chiudi">×</button>
        <h2 class="modal-title"></h2>
        <div class="modal-body"></div>
        <div class="modal-actions"></div>
      </div>
    </dialog>

    <div id="toastHost" class="toast-host" aria-live="polite"></div>
    <input id="importFile" type="file" accept="application/json" hidden>
  </body>
</html>
